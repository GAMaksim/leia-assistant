<! DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEIE - JDU Assistant</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 3D Avatar Container -->
    <div id="avatar-container"></div>
    
    <!-- UI Overlay -->
    <div id="ui-overlay">
        <!-- Header -->
        <header id="header">
            <div id="logo">
                <span class="logo-text">LEIE</span>
                <span class="logo-subtitle">JDU Assistant</span>
            </div>
            <div id="datetime"></div>
            <div id="language-selector">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="uz">UZ</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ja">日本語</button>
            </div>
        </header>
        
        <!-- Subtitles -->
        <div id="subtitles-container">
            <div id="subtitles"></div>
        </div>
        
        <!-- Chat Input -->
        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="input-container">
                <button id="mic-button" title="Говорить">🎤</button>
                <input type="text" id="text-input" placeholder="Напишите сообщение... ">
                <button id="send-button" title="Отправить">➤</button>
            </div>
        </div>
        
        <!-- Status Indicator -->
        <div id="status-indicator">
            <span id="status-dot"></span>
            <span id="status-text">Готов к общению</span>
        </div>
    </div>
    
    <!-- Import Map for Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.1.0/lib/three-vrm.module.js"
        }
    }
    </script>
    
    <!-- App Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
